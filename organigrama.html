body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;padding:20px;color:#1a1a1a;}
.container{max-width:900px;margin:0 auto;}
h1{font-size:20px;font-weight:500;color:#042C53;margin-bottom:4px;}
.subtitle{font-size:13px;color:#888;margin-bottom:16px;}
.stats{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.stat{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:10px 16px;font-size:12px;color:#666;}
.stat span{font-weight:600;color:#042C53;font-size:18px;display:block;}
.toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.toolbar input{flex:1;min-width:200px;font-size:13px;padding:8px 12px;border:1px solid #ddd;border-radius:8px;outline:none;}
.toolbar input:focus{border-color:#378ADD;}
.btn{font-size:12px;padding:8px 14px;border:1px solid #ddd;border-radius:8px;cursor:pointer;background:#fff;color:#333;white-space:nowrap;}
.btn:hover{background:#f0f0f0;}
.node-wrap{margin:4px 0;}
.node-row{display:flex;align-items:flex-start;gap:6px;}
.toggle-btn{margin-top:10px;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#888;flex-shrink:0;cursor:pointer;}
.node-card{border-radius:10px;padding:10px 14px;min-width:220px;max-width:280px;cursor:pointer;}
.node-name{font-size:13px;font-weight:600;line-height:1.3;margin-bottom:2px;}
.node-pos{font-size:11px;margin-bottom:6px;opacity:0.85;}
.email-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.email-text{font-size:10px;font-family:'Courier New',monospace;opacity:0.9;flex:1;min-width:0;word-break:break-all;}
.copy-btn{font-size:11px;font-weight:600;padding:5px 12px;border-radius:6px;cursor:pointer;border:none;white-space:nowrap;flex-shrink:0;}
.copy-btn:hover{opacity:0.85;}
.copy-btn.copied{background:#1D9E75!important;color:#fff!important;}
.children{padding-left:28px;border-left:2px solid #ddd;margin-left:18px;margin-top:2px;}

.lvl0 .node-name{color:#E6F1FB;}
.lvl0 .node-pos{color:#85B7EB;}

const emailMap={},supMap={},rangoMap={};

const children={};
RAW.forEach(([n,s])=>{if(s){if(!children[s])children[s]=[];children[s].push(n);}});
const supervisors=new Set(RAW.map(r=>r[1]).filter(Boolean));
document.getElementById('s-teams').textContent=[...supervisors].length;
let openNodes=new Set(['Luis Enrique Cruz']);
let btnCounter=0;

function showToast(){
  const t=document.getElementById('toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1800);
}
function copyEmail(event,email,btnId){
  event.stopPropagation();
  if(!email)return;
  navigator.clipboard.writeText(email).then(()=>{
    const btn=document.getElementById(btnId);
    if(btn){btn.textContent='Copiado ✓';btn.classList.add('copied');setTimeout(()=>{btn.textContent='Copiar';btn.classList.remove('copied');},2000);}
    showToast();
  });
}
function toggleNode(name){
  if(openNodes.has(name))openNodes.delete(name);
  else openNodes.add(name);
  renderTree();
}
function expandAll(){
  RAW.forEach(([n])=>openNodes.add(n));
  Object.keys(children).forEach(k=>openNodes.add(k));
  renderTree();
}
function collapseAll(){
  openNodes=new Set(['Luis Enrique Cruz']);
  renderTree();
}
function buildNode(name,level){
  const kids=(children[name]||[]).sort((a,b)=>a.localeCompare(b));
  const hasKids=kids.length>0;
  const isOpen=openNodes.has(name);
  const email=emailMap[name]||'';
  const rango=rangoMap[name]||'';
  const lc='lvl'+Math.min(level,5);
  const safeName=name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  const btnId='btn_'+(btnCounter++);
  let html=`<div class="node-wrap">
    <div class="node-row ${lc}">
      <div class="toggle-btn" onclick="toggleNode('${safeName}')">${hasKids?(isOpen?'▾':'▸'):'·'}</div>
      <div class="node-card" onclick="toggleNode('${safeName}')">
        <div class="node-name">${name}</div>
        <div class="node-pos">${rango}</div>
        ${email?`<div class="email-row" onclick="event.stopPropagation()">
          <span class="email-text">${email}</span>
          <button class="copy-btn" id="${btnId}" onclick="copyEmail(event,'${email}','${btnId}')">Copiar</button>
        </div>`:'<div style="font-size:11px;opacity:0.5;margin-top:2px;">sin email</div>'}
      </div>
    </div>`;
  if(hasKids&&isOpen){
    html+=`<div class="children">`;
    kids.forEach(k=>{html+=buildNode(k,level+1);});
    html+=`</div>`;
  }
  html+=`</div>`;
  return html;
}
function renderTree(){
  btnCounter=0;
  const q=document.getElementById('search').value.toLowerCase().trim();
  const tree=document.getElementById('tree');
  if(q){
    const matches=RAW.filter(([n])=>n.toLowerCase().includes(q));
    tree.innerHTML=matches.map(([n])=>{
      const em=emailMap[n]||'';
      const id='btn_'+(btnCounter++);
      return `<div class="search-result">
        <div style="flex:1;">
          <div style="font-size:13px;font-weight:600;color:#042C53;">${n}</div>
          <div style="font-size:11px;color:#666;">${rangoMap[n]||''}</div>
          <div style="font-size:11px;font-family:monospace;color:#444;">${em||'sin email'}</div>
        </div>
        ${em?`<button id="${id}" onclick="copyEmail(event,'${em}','${id}')" style="font-size:12px;font-weight:600;padding:7px 16px;border-radius:6px;cursor:pointer;border:none;background:#185FA5;color:#fff;">Copiar</button>`:''}
      </div>`;
    }).join('');
    return;
  }
  tree.innerHTML=buildNode('Luis Enrique Cruz',0);
}
document.getElementById('search').addEventListener('input',renderTree);
