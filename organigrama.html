const SHEET_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vS-CpZK78m6Sjz5450dGOL3042NUbPhDiUk3CYhAmarN8Ff2vccbL9E3xeQJyL-ohRcfqf3WVVVDz1B/pub?gid=0&single=true&output=csv';

// Tab switching
function switchTab(tab, btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
}
window.switchTab=switchTab;

// Log functions
let allLogs=[];
function fmtTime(ts){
  const d=ts?new Date(ts):new Date();
  return d.toLocaleDateString('es-PR',{month:'short',day:'numeric',year:'numeric'})+' '+d.toLocaleTimeString('es-PR',{hour:'2-digit',minute:'2-digit'});
}
function renderLog(){
  const q=(document.getElementById('log-search').value||'').toLowerCase().trim();
  const el=document.getElementById('log-container');
  if(!allLogs.length){el.innerHTML='<div class="log-empty">Sin cambios aún</div>';return;}

  // Filter by search
  const filtered=q?allLogs.filter(e=>(e.rawName||'').toLowerCase().includes(q)):allLogs;
  if(!filtered.length){el.innerHTML='<div class="log-empty">No se encontraron cambios para ese usuario</div>';return;}

  // Group by user if searching, otherwise show flat list
  if(q){
    const grouped={};
    filtered.forEach(e=>{
      const name=e.rawName||'General';
      if(!grouped[name]) grouped[name]=[];
      grouped[name].push(e);
    });
    el.innerHTML=Object.entries(grouped).map(([name,entries])=>`
      <div class="log-user-group">
        <div class="log-user-name">👤 ${name}</div>
        ${entries.map(e=>`<div class="log-entry">
          <div class="log-entry-time">${fmtTime(e.ts)}</div>
          <div class="log-entry-msg">${e.msg}</div>
        </div>`).join('')}
      </div>`).join('');
  } else {
    el.innerHTML=filtered.map(e=>`<div class="log-entry">
      <div class="log-entry-time">${fmtTime(e.ts)}</div>
      <div class="log-entry-msg">${e.msg}</div>
    </div>`).join('');
  }
}
window.renderLog=renderLog;

// Listen to log in real time
onSnapshot(query(collection(db,'logs'),orderBy('ts','desc'),limit(200)),(snap)=>{
  allLogs=snap.docs.map(d=>d.data());
  renderLog();
});

async function addLog(msg, rawName=''){
  try{ await addDoc(collection(db,'logs'),{msg,rawName,ts:Date.now()}); }
  catch(e){ console.error(e); }
}

// Sheet sync
async function syncSheet(){
  const btn=document.querySelector('.sheet-btn');
  btn.textContent='⏳ Cargando...';btn.disabled=true;
  try{
    const res=await fetch(SHEET_URL);
    const text=await res.text();
    const rows=text.trim().split('\n').map(r=>r.split(','));
    const headers=rows[0].map(h=>h.trim().replace(/"/g,'').toLowerCase());
    // Find column indexes
    const iVal=headers.findIndex(h=>h.includes('validado'));
    const iName=headers.findIndex(h=>h.includes('nombre completo'));
    const iSup=headers.findIndex(h=>h.includes('supervisor'));
    const iRango=headers.findIndex(h=>h.includes('rango'));
    const iEmail=headers.findIndex(h=>h.includes('corporateemail'));
    if(iName===-1||iSup===-1){throw new Error('Columnas no encontradas');}

    // Parse only TRUE rows
    const sheetData={};
    rows.slice(1).forEach(r=>{
      const val=(r[iVal]||'').trim().replace(/"/g,'').toUpperCase();
      if(val!=='TRUE') return;
      const name=(r[iName]||'').trim().replace(/"/g,'');
      if(!name) return;
      sheetData[name]={
        name,
        sup:(r[iSup]||'').trim().replace(/"/g,''),
        rango:(r[iRango]||'').trim().replace(/"/g,''),
        email:iEmail>=0?(r[iEmail]||'').trim().replace(/"/g,''):'',
      };
    });

    // Compare with current RAW
    const currentMap={};
    RAW.forEach(([n,s,r,e])=>currentMap[n]={name:n,sup:s,rango:r,email:e});

    const logs=[];
    let added=0,removed=0,changed=0;

    // Find added
    Object.keys(sheetData).forEach(name=>{
      if(!currentMap[name]){
        added++;
        const d=sheetData[name];
        RAW.push([d.name,d.sup,d.rango,d.email]);
        emailMap[d.name]=d.email;
        supMap[d.name]=d.sup;
        rangoMap[d.name]=d.rango;
        if(d.sup){if(!children[d.sup])children[d.sup]=[];if(!children[d.sup].includes(d.name))children[d.sup].push(d.name);}
        logs.push({msg:`<span class="log-add">➕ Agregado:</span> ${name}`,rawName:name});
      } else {
        // Check for changes
        const cur=currentMap[name];
        const changes=[];
        if(cur.rango!==sheetData[name].rango) changes.push(`Rango: ${cur.rango}→${sheetData[name].rango}`);
        if(cur.email!==sheetData[name].email) changes.push(`Email actualizado`);
        if(cur.sup!==sheetData[name].sup) changes.push(`Supervisor: ${cur.sup}→${sheetData[name].sup}`);
        if(changes.length>0){
          changed++;
          // Update RAW
          const idx=RAW.findIndex(r=>r[0]===name);
          if(idx>=0){RAW[idx]=[sheetData[name].name,sheetData[name].sup,sheetData[name].rango,sheetData[name].email];}
          emailMap[name]=sheetData[name].email;
          supMap[name]=sheetData[name].sup;
          rangoMap[name]=sheetData[name].rango;
          logs.push({msg:`<span class="log-change">✏️ Cambio:</span> ${name} — ${changes.join(', ')}`,rawName:name});
        }
      }
    });

    // Find removed
    Object.keys(currentMap).forEach(name=>{
      if(!sheetData[name]&&name!=='Luis Enrique Cruz'){
        removed++;
        const idx=RAW.findIndex(r=>r[0]===name);
        if(idx>=0) RAW.splice(idx,1);
        delete emailMap[name];delete supMap[name];delete rangoMap[name];
        Object.keys(children).forEach(k=>{children[k]=children[k].filter(c=>c!==name);});
        logs.push({msg:`<span class="log-remove">❌ Removido:</span> ${name}`,rawName:name});
      }
    });

    // Rebuild children
    Object.keys(children).forEach(k=>children[k]=[]);
    RAW.forEach(([n,s])=>{if(s){if(!children[s])children[s]=[];if(!children[s].includes(n))children[s].push(n);}});

    // Update stats
    const supervisors=new Set(RAW.map(r=>r[1]).filter(Boolean));
    document.getElementById('s-teams').textContent=[...supervisors].length;
    document.querySelector('.stats .stat:nth-child(2) span').textContent=RAW.length;

    const summary=`🔄 Sheet sincronizado — ${added} agregado${added!==1?'s':''}, ${removed} removido${removed!==1?'s':''}, ${changed} cambio${changed!==1?'s':''}`;
    logs.unshift({msg:`<span class="log-sync">${summary}</span>`,rawName:''});
    for(const entry of logs) await addLog(entry.msg, entry.rawName);

    showToast(`✓ ${added} agregados, ${removed} removidos, ${changed} cambios`);
    renderTree();
  }catch(e){
    console.error(e);
    showToast('Error al leer el Sheet');
    await addLog(`<span class="log-remove">⚠️ Error al sincronizar Sheet: ${e.message}</span>`,'');
  }
  btn.textContent='🔄 Actualizar desde Sheet';btn.disabled=false;
}
window.syncSheet=syncSheet;

const CHECKS=['db','licencia','permiso','validado'];
const CHECK_LABELS={db:'Encontrado en Planet DB',licencia:'Licencia Core HubSpot',permiso:'Permiso correcto en HubSpot',validado:'Validado y entrado'};
const emailMap={},supMap={},rangoMap={};
RAW.forEach(([n,s,r,e])=>{emailMap[n]=e;supMap[n]=s;rangoMap[n]=r;});
const children={};
RAW.forEach(([n,s])=>{if(s){if(!children[s])children[s]=[];children[s].push(n);}});
const supervisors=new Set(RAW.map(r=>r[1]).filter(Boolean));
document.getElementById('s-teams').textContent=[...supervisors].length;

let openNodes=new Set(['Luis Enrique Cruz']);
let currentFilter='all';
let btnCounter=0;
let checksCache={};

function setSyncStatus(s){
  const el=document.getElementById('sync-status');
  if(s==='ok'){el.textContent='✓ Sincronizado';el.className='sync-status sync-ok';}
  else if(s==='err'){el.textContent='✗ Sin conexión';el.className='sync-status sync-err';}
  else{el.textContent='Sincronizando...';el.className='sync-status sync-loading';}
}

onSnapshot(collection(db,'checks'),(snapshot)=>{
  snapshot.docChanges().forEach(change=>{
    const name=change.doc.id.replace(/_/g,' ');
    if(change.type==='removed') delete checksCache[name];
    else checksCache[name]=change.doc.data();
  });
  setSyncStatus('ok');
  updateDoneCount();
  renderTree();
},(err)=>{console.error(err);setSyncStatus('err');});

function getChecks(name){return checksCache[name]||{};}
async function setCheck(name,field,val){
  setSyncStatus('loading');
  const key=name.replace(/ /g,'_');
  const cur={...getChecks(name)};
  cur[field]=val;
  checksCache[name]=cur;
  try{await setDoc(doc(db,'checks',key),cur);setSyncStatus('ok');}
  catch(e){console.error(e);setSyncStatus('err');}
}
function getCheckCount(name){return CHECKS.filter(k=>getChecks(name)[k]).length;}
function updateDoneCount(){document.getElementById('s-done').textContent=RAW.filter(([n])=>getCheckCount(n)===4).length;}

// Filter: show node if it passes, dim it if it doesn't but has matching descendants
function passesFilter(name){
  const c=getChecks(name);const cnt=CHECKS.filter(k=>c[k]).length;
  if(currentFilter==='all') return true;
  if(currentFilter==='none') return cnt===0;
  if(currentFilter==='partial') return cnt>0&&cnt<4;
  if(currentFilter==='complete') return cnt===4;
  return !!c[currentFilter];
}
function hasMatchingDescendant(name){
  if(passesFilter(name)) return true;
  return (children[name]||[]).some(k=>hasMatchingDescendant(k));
}

function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTree();
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.opacity=1;setTimeout(()=>t.style.opacity=0,1800);}
function copyText(event,text,btnId){
  event.stopPropagation();if(!text)return;
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.getElementById(btnId);
    if(btn){const orig=btn.textContent;btn.textContent='✓';btn.classList.add('copied');setTimeout(()=>{btn.textContent=orig;btn.classList.remove('copied');},2000);}
    showToast('Copiado ✓');
  });
}
function toggleCheck(event,name,field){
  event.stopPropagation();
  const c=getChecks(name);
  setCheck(name,field,!c[field]);
  renderTree();
}
function toggleNode(name){if(openNodes.has(name))openNodes.delete(name);else openNodes.add(name);renderTree();}
function expandAll(){RAW.forEach(([n])=>openNodes.add(n));Object.keys(children).forEach(k=>openNodes.add(k));renderTree();}
function collapseAll(){openNodes=new Set(['Luis Enrique Cruz']);renderTree();}

function buildNode(name,level){
  // Skip entirely if no match at all
  if(!hasMatchingDescendant(name)) return '';
  const kids=(children[name]||[]).sort((a,b)=>a.localeCompare(b));
  const hasKids=kids.length>0;
  const isOpen=openNodes.has(name);
  const passes=passesFilter(name);
  const email=emailMap[name]||'';
  const rango=rangoMap[name]||'';
  const lc='lvl'+Math.min(level,5);
  const sn=name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  const nb='nb_'+(btnCounter++);
  const eb='eb_'+(btnCounter++);
  const chks=getChecks(name);
  const cnt=CHECKS.filter(k=>chks[k]).length;
  const kidCount=(children[name]||[]).length;

  // Expand button style
  let expandClass='no-kids';
  let expandLabel='&nbsp;&nbsp;•&nbsp;&nbsp;';
  if(hasKids&&isOpen){expandClass='has-kids-open';expandLabel=`− ${kidCount} miembro${kidCount!==1?'s':''}`;}
  else if(hasKids&&!isOpen){expandClass='has-kids-closed';expandLabel=`+ ${kidCount} miembro${kidCount!==1?'s':''}`;}

  let html=`<div class="node-wrap ${passes?'':'dimmed'}">
    <div class="node-row ${lc}">
      <button class="expand-btn ${expandClass}" onclick="toggleNode('${sn}')">${expandLabel}</button>
      <div class="node-card" onclick="toggleNode('${sn}')">
        <div class="name-row">
          <span class="node-name">${name}</span>
          <button class="copy-btn" id="${nb}" onclick="copyText(event,'${name.replace(/'/g,"\\'")}','${nb}')">Nombre</button>
        </div>
        <div class="node-pos">${rango}</div>
        <div class="email-row" onclick="event.stopPropagation()">
          <span class="email-text" title="${email}">${email||'sin email'}</span>
          ${email?`<button class="copy-btn" id="${eb}" onclick="copyText(event,'${email}','${eb}')">Email</button>`:''}
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${cnt*25}%"></div></div>
        <div class="checks" onclick="event.stopPropagation()">
          ${CHECKS.map(k=>`<label class="check-item"><input type="checkbox" ${chks[k]?'checked':''} onchange="toggleCheck(event,'${sn}','${k}')"><span class="check-label">${CHECK_LABELS[k]}</span></label>`).join('')}
        </div>
      </div>
    </div>`;

  if(hasKids&&isOpen){
    html+=`<div class="children">`;
    kids.forEach(k=>{html+=buildNode(k,level+1);});
    html+=`</div>`;
  }
  html+=`</div>`;
  return html;
}

function getChain(name){const chain=[];let cur=supMap[name]||'';const seen=new Set([name]);while(cur&&!seen.has(cur)){chain.push(cur);seen.add(cur);cur=supMap[cur]||'';}return chain;}

function renderTree(){
  btnCounter=0;
  const q=document.getElementById('search').value.toLowerCase().trim();
  const tree=document.getElementById('tree');
  if(q){
    const matches=RAW.filter(([n])=>n.toLowerCase().includes(q));
    tree.innerHTML=matches.map(([n])=>{
      const em=emailMap[n]||'';const nb='nb_'+(btnCounter++);const eb='eb_'+(btnCounter++);
      const chks=getChecks(n);const cnt=CHECKS.filter(k=>chks[k]).length;
      const chain=getChain(n);
      const chainHtml=chain.length>0?`<div style="margin-top:10px;padding-top:10px;border-top:1px solid #eee;">
        <div style="font-size:11px;font-weight:700;color:#888;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.05em;">Sus líderes</div>
        ${chain.map((lider,i)=>{const lem=emailMap[lider]||'';const lid='eb_'+(btnCounter++);
          return`<div class="lider-row" style="background:${i===0?'#E6F1FB':'#f5f5f0'}">
            <div class="lider-num">${i+1}</div>
            <div style="flex:1;min-width:0;">
              <div style="font-size:12px;font-weight:700;color:#042C53;">${lider}</div>
              <div style="font-size:11px;color:#666;">${rangoMap[lider]||''}</div>
              ${lem?`<div style="font-size:11px;font-family:monospace;color:#888;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${lem}</div>`:''}
            </div>
            ${lem?`<button id="${lid}" onclick="copyText(event,'${lem}','${lid}')" style="font-size:10px;font-weight:700;padding:4px 9px;border-radius:5px;cursor:pointer;border:none;background:#185FA5;color:#fff;flex-shrink:0;">Email</button>`:''}
          </div>`;}).join('')}
      </div>`:'';
      return`<div class="search-card">
        <div style="display:flex;align-items:flex-start;gap:10px;">
          <div style="flex:1;min-width:0;">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;flex-wrap:wrap;">
              <span style="font-size:14px;font-weight:700;color:#042C53;">${n}</span>
              <button id="${nb}" onclick="copyText(event,'${n.replace(/'/g,"\\'")}','${nb}')" style="font-size:10px;font-weight:700;padding:4px 9px;border-radius:5px;cursor:pointer;border:none;background:#042C53;color:#E6F1FB;">Nombre</button>
            </div>
            <div style="font-size:12px;color:#666;margin-bottom:6px;">${rangoMap[n]||''}</div>
            <div style="display:flex;align-items:center;gap:6px;">
              <span style="font-size:12px;font-family:monospace;color:#444;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;">${em||'sin email'}</span>
              ${em?`<button id="${eb}" onclick="copyText(event,'${em}','${eb}')" style="font-size:10px;font-weight:700;padding:4px 9px;border-radius:5px;cursor:pointer;border:none;background:#185FA5;color:#fff;flex-shrink:0;">Email</button>`:''}
            </div>
          </div>
        </div>
        <div style="margin-top:10px;">
          <div style="height:4px;border-radius:2px;background:#e0e0e0;margin-bottom:8px;overflow:hidden;"><div style="height:100%;background:#1D9E75;width:${cnt*25}%;transition:width 0.3s;"></div></div>
          ${CHECKS.map(k=>`<label style="display:flex;align-items:center;gap:7px;cursor:pointer;padding:3px 0;">
            <input type="checkbox" ${chks[k]?'checked':''} onchange="toggleCheck(event,'${n.replace(/'/g,"\\'")}','${k}')" style="width:15px;height:15px;cursor:pointer;accent-color:#1D9E75;">
            <span style="font-size:12px;color:#333;">${CHECK_LABELS[k]}</span>
          </label>`).join('')}
        </div>
        ${chainHtml}
      </div>`;
    }).join('');
    return;
  }
  tree.innerHTML=buildNode('Luis Enrique Cruz',0);
}

window.toggleNode=toggleNode;
window.copyText=copyText;
window.toggleCheck=toggleCheck;
window.expandAll=expandAll;
window.collapseAll=collapseAll;
window.setFilter=setFilter;

document.getElementById('search').addEventListener('input',renderTree);
renderTree();
