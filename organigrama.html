<body>
<div class="container">
<h1>Organigrama Planet Solar</h1>
<p class="subtitle">Jerarquía de equipos GUD</p>
<div class="stats">
  <div class="stat"><span id="s-teams">—</span>equipos</div>
  <div class="stat"><span id="s-users">151</span>usuarios</div>
  <div class="stat"><span>6</span>niveles</div>
  <div class="stat"><span id="s-done">0</span>completados ✅</div>
  <span class="sync-status sync-loading" id="sync-status">Conectando...</span>
</div>
<div class="toolbar">
  <div style="flex:1;position:relative;min-width:200px;">
    <input type="text" id="search" placeholder="Buscar por nombre o email..." style="width:100%;padding-right:32px;">
    <button id="search-clear" onclick="clearSearch()" style="display:none;position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:#aaa;line-height:1;">✕</button>
  </div>
  <button class="btn" onclick="expandAll()">Expandir todo</button>
  <button class="btn" onclick="collapseAll()">Colapsar</button>
  <button class="btn sheet-btn" onclick="syncSheet()">🔄 Actualizar desde Sheet</button>
</div>
<div class="filters">
  <span class="filter-label">Filtrar:</span>
  <button class="filter-btn active" onclick="setFilter('all',this)">Todos</button>
  <button class="filter-btn" onclick="setFilter('incomplete',this)">No completados</button>
  <button class="filter-btn" onclick="setFilter('partial',this)">En progreso</button>
  <button class="filter-btn" onclick="setFilter('complete',this)">Completados ✅</button>
  <button class="filter-btn" onclick="setFilter('bd',this)">Existe en BD</button>
  <button class="filter-btn" onclick="setFilter('email',this)">Email HubSpot</button>
  <button class="filter-btn" onclick="setFilter('grupo',this)">Grupo HubSpot</button>
  <button class="filter-btn" onclick="setFilter('licencia',this)">Licencia Core</button>
  <button class="filter-btn" onclick="setFilter('permisos',this)">Permisos</button>
  <button class="filter-btn" onclick="setFilter('asignado',this)">Grupo asignado</button>
  <button class="filter-btn" onclick="setFilter('validado',this)">Validado ✅</button>
</div>
<div class="layout">
  <div class="main-col">
    <div id="tree"></div>
  </div>
  <div class="log-col">
    <div class="log-header">
      <span class="log-title">📋 Historial de cambios</span>
    </div>
    <input type="text" class="log-search" id="log-search" placeholder="🔍 Buscar usuario..." oninput="renderLog()">
    <div class="log-container" id="log-container"><div class="log-empty">Sin cambios aún</div></div>
  </div>
</div>
<div class="toast" id="toast"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, addDoc, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDAQuaSxlLYn0sEUkjdx70QW2CFQAv7dkQ",
  authDomain: "orgama-gud.firebaseapp.com",
  projectId: "orgama-gud",
  storageBucket: "orgama-gud.firebasestorage.app",
  messagingSenderId: "842692575659",
  appId: "1:842692575659:web:47b1765950062b9980d2ee"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const SHEET_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vS-CpZK78m6Sjz5450dGOL3042NUbPhDiUk3CYhAmarN8Ff2vccbL9E3xeQJyL-ohRcfqf3WVVVDz1B/pub?gid=0&single=true&output=csv';

// Log functions
let allLogs=[];
let sheetLoaded=false;
let checksLoaded=false;

function tryUpdateDoneCount(){
  if(sheetLoaded&&checksLoaded){
    document.getElementById('s-done').textContent=RAW.filter(([n])=>getCheckCount(n)===7).length;
  }
}

function fmtTime(ts){
  const d=ts?new Date(ts):new Date();
  return d.toLocaleDateString('es-PR',{month:'short',day:'numeric',year:'numeric'})+' • '+d.toLocaleTimeString('es-PR',{hour:'2-digit',minute:'2-digit'});
}
function renderLog(){
  const q=(document.getElementById('log-search').value||'').toLowerCase().trim();
  const el=document.getElementById('log-container');
  if(!allLogs.length){el.innerHTML='<div class="log-empty">Sin cambios aún</div>';return;}
  // Search by rawName OR by email (stored in rawEmail) OR by msg content
  const filtered=q?allLogs.filter(e=>{
    const nameMatch=(e.rawName||'').toLowerCase().includes(q);
    const emailMatch=(e.rawEmail||'').toLowerCase().includes(q);
    const msgMatch=(e.msg||'').toLowerCase().includes(q);
    return nameMatch||emailMatch||msgMatch;
  }):allLogs;
  if(!filtered.length){el.innerHTML='<div class="log-empty">No encontrado</div>';return;}
  if(q){
    const grouped={};
    filtered.forEach(e=>{const name=e.rawName||'General';if(!grouped[name])grouped[name]=[];grouped[name].push(e);});
    el.innerHTML=Object.entries(grouped).map(([name,entries])=>`
      <div class="log-user-group">
        <div class="log-user-name">👤 ${name}</div>
        ${entries.map(e=>`<div class="log-entry">
          <div class="log-entry-time">${fmtTime(e.ts)}</div>
          <div class="log-entry-msg">${e.msg}</div>
        </div>`).join('')}
      </div>`).join('');
  } else {
    el.innerHTML=filtered.map(e=>`<div class="log-entry">
      <div class="log-entry-time">${fmtTime(e.ts)}</div>
      <div class="log-entry-msg">${e.msg}</div>
    </div>`).join('');
  }
}
window.renderLog=renderLog;

// Listen to log in real time
onSnapshot(query(collection(db,'logs'),orderBy('ts','desc'),limit(200)),(snap)=>{
  allLogs=snap.docs.map(d=>d.data());
  renderLog();
});

async function addLog(msg, rawName=''){
  const rawEmail=emailMap[rawName]||'';
  try{ await addDoc(collection(db,'logs'),{msg,rawName,rawEmail,ts:Date.now()}); }
  catch(e){ console.error(e); }
}

// Core data - starts empty, loaded from Sheet via Firebase
let RAW=[];

const CHECKS=['bd','email','grupo','licencia','permisos','asignado','validado'];
const CHECK_LABELS={bd:'Existe en BD',email:'Email en HubSpot',grupo:'Grupo en HubSpot',licencia:'Licencia Core',permisos:'Permisos correctos',asignado:'Grupo asignado',validado:'Validado ✅'};
const emailMap={},supMap={},rangoMap={},pvMap={},nombreEncontradoMap={},telefonoMap={};
const children={};

let openNodes=new Set(['Luis Enrique Cruz']);
let currentFilter='all';
let btnCounter=0;
let checksCache={};

function setSyncStatus(s){
  const el=document.getElementById('sync-status');
  if(s==='ok'){el.textContent='✓ Sincronizado';el.className='sync-status sync-ok';}
  else if(s==='err'){el.textContent='✗ Sin conexión';el.className='sync-status sync-err';}
  else{el.textContent='Sincronizando...';el.className='sync-status sync-loading';}
}

function rebuildMaps(){
  Object.keys(emailMap).forEach(k=>delete emailMap[k]);
  Object.keys(supMap).forEach(k=>delete supMap[k]);
  Object.keys(rangoMap).forEach(k=>delete rangoMap[k]);
  Object.keys(pvMap).forEach(k=>delete pvMap[k]);
  Object.keys(nombreEncontradoMap).forEach(k=>delete nombreEncontradoMap[k]);
  Object.keys(telefonoMap).forEach(k=>delete telefonoMap[k]);
  Object.keys(children).forEach(k=>delete children[k]);
  RAW.forEach(([n,s,r,e,pv,ne,tel])=>{emailMap[n]=e;supMap[n]=s;rangoMap[n]=r;pvMap[n]=pv||'';nombreEncontradoMap[n]=ne||'';telefonoMap[n]=tel||'';});
  RAW.forEach(([n,s])=>{if(s){if(!children[s])children[s]=[];if(!children[s].includes(n))children[s].push(n);}});
  const supervisors=new Set(RAW.map(r=>r[1]).filter(Boolean));
  document.getElementById('s-teams').textContent=[...supervisors].length;
  document.querySelector('.stats .stat:nth-child(2) span').textContent=RAW.length;
}

// Parse CSV text into sheetData object
function parseSheetCSV(text){
  const rows=text.trim().split('\n').map(r=>r.split(','));
  const headers=rows[0].map(h=>h.trim().replace(/"/g,'').toLowerCase());
  const iVal=headers.findIndex(h=>h.includes('validado'));
  const iName=headers.findIndex(h=>h.includes('nombre completo'));
  const iSup=headers.findIndex(h=>h.includes('supervisor'));
  const iRango=headers.findIndex(h=>h.includes('rango'));
  const iEmail=headers.findIndex(h=>h.includes('corporateemail'));
  const iPV=headers.findIndex(h=>h.includes('pv'));
  const iNombreEncontrado=headers.findIndex(h=>h.includes('nombre encontrado'));
  const iTelefono=headers.findIndex(h=>h.includes('telefono'));
  if(iName===-1||iSup===-1) throw new Error('Columnas no encontradas');
  const sheetData={};
  rows.slice(1).forEach(r=>{
    const val=(r[iVal]||'').trim().replace(/"/g,'').toUpperCase();
    if(val!=='TRUE') return;
    const name=(r[iName]||'').trim().replace(/"/g,'');
    if(!name) return;
    sheetData[name]={
      name,
      sup:(r[iSup]||'').trim().replace(/"/g,''),
      rango:(r[iRango]||'').trim().replace(/"/g,''),
      email:iEmail>=0?(r[iEmail]||'').trim().replace(/"/g,''):'',
      pv:iPV>=0?(r[iPV]||'').trim().replace(/"/g,''):'',
      nombreEncontrado:iNombreEncontrado>=0?(r[iNombreEncontrado]||'').trim().replace(/"/g,''):'',
      telefono:iTelefono>=0?(r[iTelefono]||'').trim().replace(/"/g,''):'',
    };
  });
  return sheetData;
}

// Apply sheetData to RAW — compare with previousData (from Firebase) to detect changes
async function applySheetData(sheetData, previousData, logChanges=true){
  const logs=[];
  let added=0,removed=0,changed=0;

  // Find added or changed
  Object.keys(sheetData).forEach(name=>{
    if(!previousData[name]){
      added++;
      RAW.push([sheetData[name].name,sheetData[name].sup,sheetData[name].rango,sheetData[name].email,sheetData[name].pv||'',sheetData[name].nombreEncontrado||'',sheetData[name].telefono||'']);
      if(logChanges) logs.push({msg:`<span class="log-add">➕ Agregado:</span> ${name}`,rawName:name});
    } else {
      const cur=previousData[name];
      const changes=[];
      if(cur.rango!==sheetData[name].rango) changes.push(`Rango: ${cur.rango}→${sheetData[name].rango}`);
      if(cur.email!==sheetData[name].email) changes.push(`Email actualizado`);
      if(cur.sup!==sheetData[name].sup) changes.push(`Supervisor: ${cur.sup}→${sheetData[name].sup}`);
      RAW.push([sheetData[name].name,sheetData[name].sup,sheetData[name].rango,sheetData[name].email,sheetData[name].pv||'',sheetData[name].nombreEncontrado||'',sheetData[name].telefono||'']);
      if(changes.length>0){
        changed++;
        if(logChanges) logs.push({msg:`<span class="log-change">✏️ Cambio:</span> ${name} — ${changes.join(', ')}`,rawName:name});
      }
    }
  });

  // Find removed
  Object.keys(previousData).forEach(name=>{
    if(!sheetData[name]){
      removed++;
      if(logChanges) logs.push({msg:`<span class="log-remove">❌ Removido:</span> ${name}`,rawName:name});
    }
  });

  rebuildMaps();

  if(logChanges&&(added||removed||changed)){
    const summary=`🔄 Sheet sincronizado — ${added} agregado${added!==1?'s':''}, ${removed} removido${removed!==1?'s':''}, ${changed} cambio${changed!==1?'s':''}`;
    logs.unshift({msg:`<span class="log-sync">${summary}</span>`,rawName:''});
    for(const entry of logs) await addLog(entry.msg,entry.rawName);
    showToast(`✓ ${added} agregados, ${removed} removidos, ${changed} cambios`);
  }

  // Save current sheet state to Firebase
  await setDoc(doc(db,'sheetState','latest'),{data:JSON.stringify(sheetData),ts:Date.now()});
  renderTree();
}

// Auto-load on page open
async function autoLoadSheet(){
  setSyncStatus('loading');
  try{
    const res=await fetch(SHEET_URL);
    const text=await res.text();
    const sheetData=parseSheetCSV(text);

    // Load previous state from Firebase
    RAW.length=0;
    let previousData={};
    try{
      const snap=await getDoc(doc(db,'sheetState','latest'));
      if(snap.exists()) previousData=JSON.parse(snap.data().data||'{}');
    }catch(e){ previousData={}; }

    const isFirstLoad=Object.keys(previousData).length===0;
    await applySheetData(sheetData, previousData, !isFirstLoad);
    sheetLoaded=true;
    tryUpdateDoneCount();
    setSyncStatus('ok');
  }catch(e){
    console.error(e);
    setSyncStatus('err');
    document.getElementById('tree').innerHTML='<div style="padding:20px;color:#c0392b;font-size:13px;">⚠️ Error cargando datos del Sheet. Verifica la conexión.</div>';
  }
}

// Manual sync button
async function syncSheet(){
  const btn=document.querySelector('.sheet-btn');
  btn.textContent='⏳ Cargando...';btn.disabled=true;
  setSyncStatus('loading');
  try{
    const res=await fetch(SHEET_URL);
    const text=await res.text();
    const sheetData=parseSheetCSV(text);

    // Load previous state
    RAW.length=0;
    let previousData={};
    try{
      const snap=await getDoc(doc(db,'sheetState','latest'));
      if(snap.exists()) previousData=JSON.parse(snap.data().data||'{}');
    }catch(e){ previousData={}; }

    await applySheetData(sheetData, previousData, true);
    setSyncStatus('ok');
  }catch(e){
    console.error(e);
    showToast('Error al leer el Sheet');
    await addLog(`<span class="log-remove">⚠️ Error al sincronizar: ${e.message}</span>`,'');
    setSyncStatus('err');
  }
  btn.textContent='🔄 Actualizar desde Sheet';btn.disabled=false;
}
window.syncSheet=syncSheet;

onSnapshot(collection(db,'checks'),(snapshot)=>{
  snapshot.docChanges().forEach(change=>{
    const name=change.doc.id.replace(/_/g,' ');
    if(change.type==='removed') delete checksCache[name];
    else checksCache[name]=change.doc.data();
  });
  checksLoaded=true;
  setSyncStatus('ok');
  tryUpdateDoneCount();
  renderTree();
},(err)=>{console.error(err);setSyncStatus('err');});

function getChecks(name){return checksCache[name]||{};}
async function setCheck(name,field,val){
  setSyncStatus('loading');
  const key=name.replace(/ /g,'_');
  const cur={...getChecks(name)};
  cur[field]=val;
  checksCache[name]=cur;
  try{await setDoc(doc(db,'checks',key),cur);setSyncStatus('ok');}
  catch(e){console.error(e);setSyncStatus('err');}
}
function getCheckCount(name){return CHECKS.filter(k=>getChecks(name)[k]).length;}
function updateDoneCount(){tryUpdateDoneCount();}

// Filter: show node if it passes, dim it if it doesn't but has matching descendants
function passesFilter(name){
  const c=getChecks(name);const cnt=CHECKS.filter(k=>c[k]).length;
  if(currentFilter==='all') return true;
  if(currentFilter==='incomplete') return cnt<7;
  if(currentFilter==='partial') return cnt>0&&cnt<7;
  if(currentFilter==='complete') return cnt===7;
  return !!c[currentFilter];
}
function hasMatchingDescendant(name){
  // For 'all' filter always show
  if(currentFilter==='all') return true;
  // Check self
  if(passesFilter(name)) return true;
  // Check all descendants
  return (children[name]||[]).some(k=>hasMatchingDescendant(k));
}
// Specifically for incomplete: a completed node should be visible only if it has incomplete descendants
function shouldShowNode(name){
  if(currentFilter==='all') return true;
  if(passesFilter(name)) return true;
  // Show as container only if has matching descendants below
  return (children[name]||[]).some(k=>hasMatchingDescendant(k));
}

function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTree();
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.opacity=1;setTimeout(()=>t.style.opacity=0,1800);}
function copyText(event,text,btnId){
  event.stopPropagation();if(!text)return;
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.getElementById(btnId);
    if(btn){const orig=btn.textContent;btn.textContent='✓';btn.classList.add('copied');setTimeout(()=>{btn.textContent=orig;btn.classList.remove('copied');},2000);}
    showToast('Copiado ✓');
  });
}
function toggleCheck(event,name,field){
  event.stopPropagation();
  const c=getChecks(name);
  const newVal=!c[field];
  setCheck(name,field,newVal);
  const label=CHECK_LABELS[field];
  const msg=newVal
    ?`<span class="log-check-on">☑ ${label}</span> — ${name}`
    :`<span class="log-check-off">☐ ${label}</span> — ${name} (desmarcado)`;
  addLog(msg,name);
  renderTree();
}
function toggleNode(name){if(openNodes.has(name))openNodes.delete(name);else openNodes.add(name);renderTree();}
function expandAll(){RAW.forEach(([n])=>openNodes.add(n));Object.keys(children).forEach(k=>openNodes.add(k));renderTree();}
function collapseAll(){openNodes=new Set(['Luis Enrique Cruz']);renderTree();}

function buildNode(name,level){
  // Skip entirely if should not show
  if(!shouldShowNode(name)) return '';
  const kids=(children[name]||[]).sort((a,b)=>a.localeCompare(b));
  const hasKids=kids.length>0;
  const isOpen=openNodes.has(name);
  const passes=passesFilter(name);
  const email=emailMap[name]||'';
  const rango=rangoMap[name]||'';
  const lc='lvl'+Math.min(level,5);
  const sn=name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  const nb='nb_'+(btnCounter++);
  const eb='eb_'+(btnCounter++);
  const chks=getChecks(name);
  const cnt=CHECKS.filter(k=>chks[k]).length;
  const kidCount=(children[name]||[]).length;

  // Count ALL descendants recursively
  function countDescendants(n){
    const k=children[n]||[];
    return k.reduce((t,c)=>t+1+countDescendants(c),0);
  }
  function countDescendantsDone(n){
    const k=children[n]||[];
    return k.reduce((t,c)=>t+(getCheckCount(c)===7?1:0)+countDescendantsDone(c),0);
  }
  const totalDesc=countDescendants(name);
  const doneDesc=countDescendantsDone(name);
  const pendingDesc=totalDesc-doneDesc;
  const kidsLabel=hasKids?`${totalDesc} miembro${totalDesc!==1?'s':''} • ${doneDesc} ✅ • ${pendingDesc} pendientes`:'';

  // Expand button style
  let expandClass='no-kids';
  let expandLabel='&nbsp;&nbsp;•&nbsp;&nbsp;';
  if(hasKids&&isOpen){expandClass='has-kids-open';expandLabel=`− ${kidsLabel}`;}
  else if(hasKids&&!isOpen){expandClass='has-kids-closed';expandLabel=`+ ${kidsLabel}`;}

  // If node doesn't pass filter but is shown as container, fade it slightly
  const nodeOpacity=!passes?'opacity:0.45;':'';

  let html=`<div class="node-wrap">
    <div class="node-row ${lc}" style="${nodeOpacity}">
      <button class="expand-btn ${expandClass}" onclick="toggleNode('${sn}')">${expandLabel}</button>
      <div class="node-card" onclick="toggleNode('${sn}')">
        ${nombreEncontradoMap[name]?`<div class="name-row" onclick="event.stopPropagation()">
          <span class="node-name">${nombreEncontradoMap[name]}</span>
          <button class="copy-btn" id="${nb}" onclick="copyText(event,'${nombreEncontradoMap[name].replace(/'/g,"\\'")}','${nb}')">Copiar</button>
        </div>`:`<div class="name-row"><span class="node-name">${name}</span></div>`}
        <div style="font-size:11px;opacity:0.7;margin-bottom:2px;">${name}</div>
        <div class="node-pos">${rango}${pvMap[name]?' • '+pvMap[name]:''}</div>
        <div class="email-row" onclick="event.stopPropagation()">
          <span class="email-text" title="${email}">${email||'sin email'}</span>
          ${email?`<button class="copy-btn" id="${eb}" onclick="copyText(event,'${email}','${eb}')">Email</button>`:''}
        </div>
        ${telefonoMap[name]?`<div style="font-size:11px;opacity:0.85;margin-bottom:6px;">📞 ${telefonoMap[name]}</div>`:''}
        ${supMap[name]?`<div class="email-row" onclick="event.stopPropagation()" style="margin-bottom:6px;">
          <span style="font-size:11px;opacity:0.8;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">👤 ${supMap[name]}</span>
          <button class="copy-btn" id="sb_${nb}" onclick="copyText(event,'${(supMap[name]||'').replace(/'/g,"\\'")}','sb_${nb}')">Líder</button>
        </div>`:''}
        <div class="progress-bar"><div class="progress-fill" style="width:${Math.round(cnt*100/7)}%"></div></div>
        <div class="checks" onclick="event.stopPropagation()">
          ${CHECKS.map(k=>`<label class="check-item"><input type="checkbox" ${chks[k]?'checked':''} onchange="toggleCheck(event,'${sn}','${k}')"><span class="check-label">${CHECK_LABELS[k]}</span></label>`).join('')}
        </div>
      </div>
    </div>`;

  if(hasKids&&isOpen){
    html+=`<div class="children">`;
    kids.forEach(k=>{html+=buildNode(k,level+1);});
    html+=`</div>`;
  }
  html+=`</div>`;
  return html;
}

function getChain(name){const chain=[];let cur=supMap[name]||'';const seen=new Set([name]);while(cur&&!seen.has(cur)){chain.push(cur);seen.add(cur);cur=supMap[cur]||'';}return chain;}

function renderTree(){
  btnCounter=0;
  const q=document.getElementById('search').value.toLowerCase().trim();
  const tree=document.getElementById('tree');
  if(q){
    const matches=RAW.filter(([n])=>n.toLowerCase().includes(q)||(emailMap[n]||'').toLowerCase().includes(q));
    tree.innerHTML=matches.map(([n])=>{
      const em=emailMap[n]||'';const nb='nb_'+(btnCounter++);const eb='eb_'+(btnCounter++);
      const chks=getChecks(n);const cnt=CHECKS.filter(k=>chks[k]).length;
      const chain=getChain(n);
      const chainHtml=chain.length>0?`<div style="margin-top:10px;padding-top:10px;border-top:1px solid #eee;">
        <div style="font-size:11px;font-weight:700;color:#888;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.05em;">Sus líderes</div>
        ${chain.map((lider,i)=>{const lem=emailMap[lider]||'';const lid='eb_'+(btnCounter++);
          return`<div class="lider-row" style="background:${i===0?'#E6F1FB':'#f5f5f0'}">
            <div class="lider-num">${i+1}</div>
            <div style="flex:1;min-width:0;">
              <div style="font-size:12px;font-weight:700;color:#042C53;">${lider}</div>
              <div style="font-size:11px;color:#666;">${rangoMap[lider]||''}</div>
              ${lem?`<div style="font-size:11px;font-family:monospace;color:#888;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${lem}</div>`:''}
            </div>
            ${lem?`<button id="${lid}" onclick="copyText(event,'${lem}','${lid}')" style="font-size:10px;font-weight:700;padding:4px 9px;border-radius:5px;cursor:pointer;border:none;background:#185FA5;color:#fff;flex-shrink:0;">Email</button>`:''}
          </div>`;}).join('')}
      </div>`:'';
      return`<div class="search-card">
        <div style="display:flex;align-items:flex-start;gap:10px;">
          <div style="flex:1;min-width:0;">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;flex-wrap:wrap;">
              <span style="font-size:14px;font-weight:700;color:#042C53;">${n}</span>
              <button id="${nb}" onclick="copyText(event,'${n.replace(/'/g,"\\'")}','${nb}')" style="font-size:10px;font-weight:700;padding:4px 9px;border-radius:5px;cursor:pointer;border:none;background:#042C53;color:#E6F1FB;">Nombre</button>
            </div>
            <div style="font-size:12px;color:#666;margin-bottom:6px;">${rangoMap[n]||''}${pvMap[n]?' • '+pvMap[n]:''}</div>
            <div style="display:flex;align-items:center;gap:6px;">
              <span style="font-size:12px;font-family:monospace;color:#444;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;">${em||'sin email'}</span>
              ${em?`<button id="${eb}" onclick="copyText(event,'${em}','${eb}')" style="font-size:10px;font-weight:700;padding:4px 9px;border-radius:5px;cursor:pointer;border:none;background:#185FA5;color:#fff;flex-shrink:0;">Email</button>`:''}
            </div>
          </div>
        </div>
        <div style="margin-top:10px;">
          <div style="height:4px;border-radius:2px;background:#e0e0e0;margin-bottom:8px;overflow:hidden;"><div style="height:100%;background:#1D9E75;width:${Math.round(cnt*100/7)}%;transition:width 0.3s;"></div></div>
          ${CHECKS.map(k=>`<label style="display:flex;align-items:center;gap:7px;cursor:pointer;padding:3px 0;">
            <input type="checkbox" ${chks[k]?'checked':''} onchange="toggleCheck(event,'${n.replace(/'/g,"\\'")}','${k}')" style="width:15px;height:15px;cursor:pointer;accent-color:#1D9E75;">
            <span style="font-size:12px;color:#333;">${CHECK_LABELS[k]}</span>
          </label>`).join('')}
        </div>
        ${chainHtml}
      </div>`;
    }).join('');
    return;
  }
  tree.innerHTML=buildNode('Luis Enrique Cruz',0);
}

window.toggleNode=toggleNode;
window.copyText=copyText;
window.toggleCheck=toggleCheck;
window.expandAll=expandAll;
window.collapseAll=collapseAll;
window.setFilter=setFilter;

function clearSearch(){
  document.getElementById('search').value='';
  document.getElementById('search-clear').style.display='none';
  renderTree();
}
window.clearSearch=clearSearch;

document.getElementById('search').addEventListener('input',function(){
  const val=this.value;
  document.getElementById('search-clear').style.display=val?'block':'none';
  renderTree();
});

// Auto-load Sheet on page open
autoLoadSheet();
renderTree();
</script>
